# ============================================================
# docker-compose.yml — RouteWise + OSRM Backend
# ============================================================
# Usage:
#   docker compose up -d              # Start both services
#   docker compose up -d routewise    # Start only the app
#   docker compose down               # Stop all services
#
# OSRM data preparation (first time):
#   Download madrid.osm.pbf from Geofabrik:
#   wget https://download.geofabrik.de/europe/spain/madrid-latest.osm.pbf -O data/madrid.osm.pbf
#
#   Then extract/locate/route:
#   docker compose run --rm osrm osrm-extract -p /opt/car.lua /data/madrid.osm.pbf
#   docker compose run --rm osrm osrm-partition /data/madrid.osrm
#   docker compose run --rm osrm osrm-customize /data/madrid.osrm
# ============================================================

services:
  # ---- RouteWise App (Next.js 14) ----
  routewise:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_OSRM_BASE_URL=http://localhost:5000
    restart: unless-stopped
    depends_on:
      - osrm

  # ---- OSRM Backend (Open Source Routing Machine) ----
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    ports:
      - "5000:5000"
    volumes:
      - osrm-data:/data
    command: >
      sh -c "osrm-routed --algorithm mld /data/madrid.osrm"
    restart: unless-stopped

volumes:
  osrm-data:
